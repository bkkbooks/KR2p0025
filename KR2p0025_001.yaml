body:
  text: 尊德義明乎民倫可以為君推忿悶戒惎勝為人上者之務也賞與刑禍福之基也有前之者矣爵位所以信其然也征陷侵所以攻刑罰所以舉也殺戮所以除怨也不由其道不行仁為可親也義為可尊也忠為可信也學為可益也教為可類也教非改道也效之也學非改倫也學己也禹以人道治其民桀以人道亂其民桀不易禹民而後亂之湯不易桀民而後治之聖人之治民民之道也禹之行水水之道也造父之御馬馬也之道也后稷之藝地地之道也莫不有道焉人道為近是以君子人道之取先察諸出所以知己知己所以知人知人所以知命知命而後知道知道而後知行由禮知樂由樂知哀有知己而不知命者亡知命而不知己者有知禮而不知樂者亡知樂而不知禮者善取人能從之上也為故率民向方者唯德可德之流速乎置郵而傳命其載也亡厚焉交矣而弗知也亡德者且莫大乎禮樂焉治樂和哀民不可惑也反之此枉矣刑不逮於君子禮不逮於小人攻眛往者復依惠則民材足不時則亡勸也不愛則不親不則弗懷不勑則亡畏不忠則不信弗用則亡覆咎則民心巠正則民不吝恭則民不怨均不足以平政家心埒不足以安民勇不足以沒蔑衆博不足以知善決不足以知倫殺不足以勝民下之事上也不從其所命而從其所行上好是物也下必有甚焉者夫唯是故德可易而施可轉也有或是施小有利轉而大有害者有之有或是施小有害轉而大有利者有之行此度也然後可逾也因恆則固察匚褻則亡僻不黨則亡怨上思則夫生而有職事者也非教所及也教其正政不教其人正政弗行矣故共終是物也而又深焉者可教也而不可疑也可教也而不可迪其民而民不可止也尊仁親忠敬壯貴禮行矣而亡遺養心於子諒忠信日益而不自知也民可使道之而不可使知之民可道也而不可強也桀不謂其民必亂而民有為亂矣受不若也可從也而不可及也君民者治民復禮民除害知智罹思勞之究也為邦而不以禮猶人之亡所適也非禮而民悅在此小人矣非倫而民服際世殜此亂矣治民非悁生而已也不以嗜欲害其義究民愛則子也弗愛則讎也民五之方格十之方爭百之而後服善者民必富富未必和不和不安不安不樂善者民必衆衆未必治不治不順不順不平是以為政者教道之取先教以禮則民果以徑教以樂則民淑德清壯教以辨說則民褻陵長悵貴憒以妄教以藝則民野以爭教以技則民小以吝教以言則民訏以寡信教以事則民力嗇穡以唅湎利教以權謀則民淫昏遠禮亡親仁先之以德則民進善焉故為政者或論之或養之或由中出或設之外論列肆列其類凡動民必順民心民心有恆求其永重義集理言此章也
